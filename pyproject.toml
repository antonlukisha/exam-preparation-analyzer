[project]
name = "exam-preparation-analyzer"
version = "0.1.0"
description = "Script for analyse exam preparation of studens"
readme = "README.md"
authors = [
    {name = "Anton Lukisha", email = "anton.lukisha.dev@gmail.com"},
]
requires-python = ">=3.13"
dependencies = [
    "tabulate>=0.10.0"
]

[project.scripts]
app = "app.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/app"]
